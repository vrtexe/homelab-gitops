piVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: test-envoy-gateway
  namespace: argocd
spec:
  project: default
  source:
    # Points to the official Envoy Gateway OCI repository
    repoURL: oci://docker.io/envoyproxy
    chart: gateway-helm
    targetRevision: v1.8.2
  destination:
    server: https://default.svc
    namespace: envoy-gateway-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
